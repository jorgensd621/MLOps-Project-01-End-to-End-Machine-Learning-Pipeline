stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
      - data/raw/data.csv
    outs:
      - data/processed/data.csv

  train:
    cmd: python src/train.py
    deps:
      - data/processed/data.csv
      - params.yaml
    outs:
      - models/model.pkl   # ← this line stays for now, but we will handle it

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - models/model.pkl
      - data/processed/data.csv
    metrics:
      - scores.json
