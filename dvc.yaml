stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
      - data/raw/data.csv
    outs:
      - data/processed/data.csv

  train:
    cmd: python src/train.py
    deps:
      - data/processed/data.csv
      - params.yaml
    # model.pkl is now in Git - no DVC output needed

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - models/model.pkl
      - data/processed/data.csv
    # removed metrics line so CI doesn't fail on missing scores.json
