name: MLOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  dvc-repro:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "dvc[s3]"

    - name: Configure DVC and Run Pipeline
      env:
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        rm -f .dvc/config .dvc/config.local

        # Configure DVC
        dvc remote add origin https://dagshub.com/jorgensd621/MLOps-Project-01-End-to-End-Machine-Learning-Pipeline.dvc --local
        dvc remote modify origin --local auth basic
        dvc remote modify origin --local user jorgensd621
        dvc remote modify origin --local password "$DAGSHUB_TOKEN"
        dvc remote default origin

        # Ensure raw data exists (self-contained CI)
        mkdir -p data/raw
        if [ ! -s data/raw/data.csv ]; then
          curl -o data/raw/data.csv https://raw.githubusercontent.com/npradaschnor/Pima-Indians-Diabetes-Dataset/master/diabetes.csv
          dvc add data/raw/data.csv
        fi

        # Run pipeline
        dvc repro --force
